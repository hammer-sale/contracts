name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build (--sizes fails if any contract exceeds the 24576-byte limit)
        run: forge build --sizes

      - name: Storage-layout drift check (the clone implementation layout must stay stable)
        run: make storage-check

      - name: Run Forge tests
        run: forge test -vvv

      - name: Gas-snapshot check (gas-regression gate, pinned fuzz seed for determinism)
        run: forge snapshot --check --fuzz-seed 1
